    },

    getYearlyAverages() {
        const years = Object.keys(userProfile).map(k => k.replace('logs_', '')).sort();
        const currentLogs = userProfile[`logs_2026`] || {};
        const currentTotal = Object.keys(currentLogs).length;

        return years.map(year => {
            const logs = userProfile[`logs_${year}`] || {};
            const yearTotal = Object.keys(logs).length;
            let sumRating = 0, countRating = 0;
            let sumRanking = 0, countRanking = 0;
            let sumWR = 0, countWR = 0;

            Object.values(logs).forEach(log => {
                const r = log.rating;
                const k = log.ranking;
                if (r > 0) { sumRating += r; countRating++; }
                if (k > 0) { 
                    sumRanking += k; countRanking++; 
                    const multiplier = yearTotal > 0 ? (currentTotal / yearTotal) : 1;
                    sumWR += (k * multiplier); countWR++;
                }
            });

            return {
                year,
                avgRating  : countRating ? sumRating / countRating : null,
                avgRanking : countRanking ? sumRanking / countRanking : null,
                avgWeightedRanking : countWR ? sumWR / countWR : null
            };
        });
    },

    getRideDataById(id) {
        const years = Object.keys(userProfile).map(k => k.replace('logs_', '')).sort();
        const currentLogs = userProfile[`logs_2026`] || {};
        const currentTotal = Object.keys(currentLogs).length;

        return years.map(year => {
            const logs = userProfile[`logs_${year}`] || {};
            const log = logs[id];
            if (!log) return { year, rating: null, ranking: null, weightedRanking: null };

            const r = log.rating;
            const k = log.ranking;
            const yearTotal = Object.keys(logs).length;
            const multiplier = yearTotal > 0 ? (currentTotal / yearTotal) : 1;

            return { 
                year, 
                rating: r > 0 ? r : null, 
                ranking: k > 0 ? k : null, 
                weightedRanking: k > 0 ? (k * multiplier) : null 
            };
        });
    },

    getFilteredTopRides() {
        const park   = Utils.getElement('otPark').value;
        const mfr    = Utils.getElement('otManufacturer').value;
        const cat    = Utils.getElement('otCategory').value;
        const type   = Utils.getElement('otType').value;
        const status = Utils.getElement('otStatus').value;

        const logs = userProfile[`logs_${currentYearStr}`] || {};
        let candidates = [];

        Object.keys(logs).forEach(id => {
            const master = masterCoasters[id];
            const log = logs[id];
            if (!master) return;
            
            if (park   && master.park !== park) return;
            if (mfr    && master.manufacturer !== mfr) return;
            if (cat    && master.category !== cat) return;
            if (type   && master.type !== type) return;
            if (status && master.status !== status) return;

            if (this.mode === 'rating'  && log.rating > 0) candidates.push({ id, rating: log.rating, ranking: log.ranking });
            if (this.mode === 'ranking' && log.ranking > 0) candidates.push({ id, rating: log.rating, ranking: log.ranking });
        });

        candidates.sort((a, b) => this.mode === 'rating' ? b.rating - a.rating : a.ranking - b.ranking);
        return candidates.slice(0, this.otLimit).map(c => c.id);
    },

    selectRide(id) {
        this.selectedRideId = id;
        Utils.getElement('otRideSearch').value = masterCoasters[id].name;
        Utils.getElement('otRideClear').style.display = 'inline-flex';
        Utils.getElement('otRideDropdown').style.display = 'none';
        this.update();
    },

    clearRide() {
        this.selectedRideId = null;
        Utils.getElement('otRideSearch').value = '';
        Utils.getElement('otRideClear').style.display = 'none';
        this.update();
    },

    setMode(mode) {
        this.mode = mode;
        const wrap = Utils.getElement('otWeightedWrap');
        if (mode === 'ranking') {
            wrap.style.display = '';
        } else {
            wrap.style.display = 'none';
            this.useWeightedRanking = false;
            Utils.getElement('otWeightedCheck').checked = false;
        }
        this.update();
    },

    setSource(src) {
        this.sourceMode = src;
        if (src === 'filters') {
            this.selectedRideId = null;
            Utils.getElement('otRideSearch').value = '';
            Utils.getElement('otRideClear').style.display = 'none';
        }
        Utils.getElement('otRidePanel').style.display     = (src === 'ride')    ? 'block' : 'none';
        Utils.getElement('otFiltersPanel').style.display   = (src === 'filters') ? 'block' : 'none';
        this.update();
    },

    update() {
        if (!this.instance) return;

        const textColor   = Utils.getCSSVariable('--text');
        const borderColor = Utils.getCSSVariable('--border');
        const years       = Object.keys(userProfile).map(k => k.replace('logs_', '')).sort().filter(y => parseInt(y) <= parseInt(currentYearStr));
        const opts        = this.instance.options;
        const yOpts       = opts.scales.y;

        const applyYAxis = (label, min, max, reverse, beginAtZero) => {
            yOpts.title.text  = label;
            if (min !== null) { yOpts.min = min; } else { delete yOpts.min; }
            if (max !== null) { yOpts.max = max; } else { delete yOpts.max; }
            yOpts.reverse     = reverse;
            yOpts.beginAtZero = beginAtZero;
            yOpts.title.color = textColor;
            yOpts.ticks.color = textColor;
            yOpts.grid.color  = borderColor;
            opts.scales.x.ticks.color = textColor;
            opts.scales.x.grid.color  = borderColor;
            opts.plugins.title.color  = textColor;
        };

        if (this.sourceMode === 'filters') {
            const topIndices = this.getFilteredTopRides();

            this.instance.data.labels = years;
            this.instance.data.datasets = topIndices.map((id, i) => {
                const rideData = this.getRideDataById(id);
                const color = this._colorOverrides[id] || this.colors[i % this.colors.length];
                const master = masterCoasters[id] || {name: 'Unknown'};
                return {
                    label: master.name,
                    _baseIdx: id,
                    data: this.mode === 'rating' ? rideData.map(d => d.rating) : (this.useWeightedRanking ? rideData.map(d => d.weightedRanking) : rideData.map(d => d.ranking)),
                    _originalData: this.mode === 'rating' ? rideData.map(d => d.rating) : (this.useWeightedRanking ? rideData.map(d => d.weightedRanking) : rideData.map(d => d.ranking)),
                    borderColor: color, pointBackgroundColor: color, pointBorderColor: color, borderWidth: 2.5, tension: 0.3, fill: false, pointRadius: 4, pointHoverRadius: 6, spanGaps: true
                };
            });

            const datasets = this.instance.data.datasets;
            const STAGGER_NORMAL = 0.02;
            const STAGGER_TIGHT = 0.01;
            for (let yi = 0; yi < years.length; yi++) {
                const groups = {};
                datasets.forEach((ds, di) => {
                    const v = ds.data[yi];
                    if (v === null || v === undefined) return;
                    const key = String(v);
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(di);
                });
                Object.values(groups).forEach(indices => {
                    if (indices.length < 2) return;
                    const stagger = indices.length > 3 ? STAGGER_TIGHT : STAGGER_NORMAL;
                    const mid = (indices.length - 1) / 2;
                    indices.forEach((di, pos) => {
                        datasets[di].data[yi] = datasets[di]._originalData[yi] + (pos - mid) * stagger;
                    });
                });
            }

            opts.plugins.legend.display = false;
            opts.plugins.legend.labels.color = textColor;
            opts.plugins.title.text = Utils.buildFilterTitle(this.otLimit, 'otStatus', 'otPark', 'otManufacturer', 'otCategory', 'otType', topIndices.length);

            if (this.mode === 'rating') {
                const allRatings  = this.instance.data.datasets.flatMap(ds => ds.data).filter(v => v !== null);
                const minRating   = allRatings.length ? Math.min(...allRatings) : 0;
                const maxRating   = allRatings.length ? Math.max(...allRatings) : 10;
                applyYAxis('Rating', Math.max(minRating - 0.2, 1), maxRating + 0.2, false, false);
            } else {
                const axisLabel = this.useWeightedRanking ? 'Weighted Ranking' : 'Ranking';
                const allRankings = this.instance.data.datasets.flatMap(ds => ds.data).filter(v => v !== null);
                const maxRank     = allRankings.length ? Math.max(...allRankings) : 20;
                applyYAxis(axisLabel, 0.5, Math.max(Math.ceil(maxRank * 1.25), 10), true, false);
            }

            const isWeightedF = this.useWeightedRanking;
            yOpts.ticks.callback = function(value, index, ticks) {
                if (index === 0 || index === ticks.length - 1) return null;
                if (yOpts.reverse) {
                    if (isWeightedF) return value >= 1 ? '#' + Number(value.toFixed(1)) : '';
                    return (Number.isInteger(value) && value >= 1) ? '#' + value : '';
                }
                return Number(value.toFixed(2));
            };

        } else {
            const isRide = this.selectedRideId !== null;
            const data   = isRide ? this.getRideDataById(this.selectedRideId) : this.getYearlyAverages();

            let values, color, title;
            if (this.mode === 'rating') {
                values = isRide ? data.map(d => d.rating !== null ? Math.round(d.rating * 10) / 10 : null) : data.map(d => d.avgRating !== null ? Math.round(d.avgRating * 10) / 10 : null);
                color = Utils.getCSSVariable('--primary');
                title = isRide ? `${masterCoasters[this.selectedRideId].name} — Rating` : 'Average Rating Over Time';
            } else if (this.useWeightedRanking) {
                values = isRide ? data.map(d => d.weightedRanking !== null ? Math.round(d.weightedRanking * 100) / 100 : null) : data.map(d => d.avgWeightedRanking !== null ? Math.round(d.avgWeightedRanking * 100) / 100 : null);
                color = Utils.getCSSVariable('--accent');
                title = isRide ? `${masterCoasters[this.selectedRideId].name} — Weighted Ranking` : 'Average Weighted Ranking Over Time';
            } else {
                values = isRide ? data.map(d => d.ranking !== null ? d.ranking : null) : data.map(d => d.avgRanking !== null ? Math.round(d.avgRanking * 10) / 10 : null);
                color = Utils.getCSSVariable('--accent');
                title = isRide ? `${masterCoasters[this.selectedRideId].name} — Ranking` : 'Average Ranking Over Time';
            }

            this.instance.data.labels = data.map(d => d.year);
            this.instance.data.datasets = [{
                label: this.mode === 'rating' ? (isRide ? 'Rating' : 'Average Rating') : (isRide ? (this.useWeightedRanking ? 'Weighted Ranking' : 'Ranking') : (this.useWeightedRanking ? 'Average Weighted Ranking' : 'Average Ranking')),
                data: values, borderColor: color, pointBackgroundColor: color, pointBorderColor: color, borderWidth: 3, tension: 0.3, fill: false, pointRadius: 6, pointHoverRadius: 8, spanGaps: isRide
            }];

            opts.plugins.legend.display = false;
            opts.plugins.title.text = title;

            if (this.mode === 'rating') {
                const allRatings  = this.instance.data.datasets.flatMap(ds => ds.data).filter(v => v !== null);
                const minRating   = allRatings.length ? Math.min(...allRatings) : 0;
                const maxRating   = allRatings.length ? Math.max(...allRatings) : 10;
                applyYAxis('Rating', Math.max(minRating - 0.2, 1), maxRating + 0.2, false, false);
            } else {
                const axisLabel = this.useWeightedRanking ? 'Weighted Ranking' : 'Ranking';
                const allRankings = this.instance.data.datasets.flatMap(ds => ds.data).filter(v => v !== null);
                const maxRank     = allRankings.length ? Math.max(...allRankings) : 20;
                applyYAxis(axisLabel, 0.5, Math.max(Math.ceil(maxRank * 1.25), 10), true, false);
            }

            const isWeighted = this.useWeightedRanking;
            yOpts.ticks.callback = function(value) {
                if (yOpts.reverse) {
                    if (isWeighted) return value >= 1 ? '#' + Number(value.toFixed(1)) : '';
                    return (Number.isInteger(value) && value >= 1) ? '#' + value : '';
                }
                return Number(value.toFixed(2));
            };
        }
        this.renderLegend();
        this.instance.update();
    },

    _palette: ['#ef4444','#f97316','#f59e0b','#eab308','#84cc16','#22c55e','#10b981','#14b8a6','#06b6d4','#0ea5e9','#3b82f6','#6366f1','#8b5cf6','#a855f7','#d946ef','#ec4899','#dc2626','#ea580c','#d97706','#ca8a04','#65a30d','#16a34a','#059669','#0d9488','#0891b2','#0284c7','#2563eb','#4f46e5','#7c3aed','#9333ea','#c026d3','#db2777','#991b1b','#9a3412','#92400e','#854d0e','#3f6212','#166534','#065f46','#115e59','#155e75','#075985','#1e40af','#3730a3','#5b21b6','#6b21a8','#86198f','#9d174d','#fca5a5','#fdba74','#fcd34d','#fde047','#bef264','#86efac','#6ee7b7','#5eead4','#67e8f9','#7dd3fc','#93c5fd','#a5b4fc','#c4b5fd','#d8b4fe','#f0abfc','#f9a8d4'],

    renderLegend() {
        const container = document.getElementById('otLegend');
        if (!container || !this.instance) return;
        if (this.sourceMode !== 'filters' || this.instance.data.datasets.length === 0) {
            container.innerHTML = ''; return;
        }
        container.innerHTML = this.instance.data.datasets.map((ds, i) => {
            const color = ds.borderColor; const full = ds.label; const short = full.length > 15 ? full.slice(0, 15) + '...' : full;
            return '<div class="ot-legend-item" title="' + full + '">' + '<span class="ot-legend-swatch" data-ds-index="' + i + '" style="background-color:' + color + ';"></span>' + '<span class="ot-legend-label">' + short + '</span></div>';
        }).join('');
        container.querySelectorAll('.ot-legend-swatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => { e.stopPropagation(); this._openColorPicker(swatch, parseInt(swatch.dataset.dsIndex)); });
        });
    },

    _openColorPicker(swatch, dsIndex) {
        const existing = document.querySelector('.ot-color-picker');
        if (existing) existing.remove();
        const picker = document.createElement('div');
        picker.className = 'ot-color-picker';
        picker.innerHTML = this._palette.map(c => '<div class="ot-color-picker-cell" data-color="' + c + '" style="background-color:' + c + ';"></div>').join('');
        document.body.appendChild(picker);
        const swatchRect = swatch.getBoundingClientRect();
        const pickerW = picker.offsetWidth; const pickerH = picker.offsetHeight;
        let left = swatchRect.left + swatchRect.width / 2 - pickerW / 2; let top = swatchRect.bottom + 6;
        if (left < 4) left = 4;
        if (left + pickerW > window.innerWidth - 4) left = window.innerWidth - pickerW - 4;
        if (top + pickerH > window.innerHeight - 4) top = swatchRect.top - pickerH - 6;
        picker.style.left = left + 'px'; picker.style.top = top + 'px'; picker.style.position = 'fixed';
        picker.querySelectorAll('.ot-color-picker-cell').forEach(cell => {
            cell.addEventListener('click', (e) => {
                e.stopPropagation();
                const color = cell.dataset.color;
                this._applyColor(dsIndex, color);
                swatch.style.backgroundColor = color;
                picker.remove();
            });
        });
        const dismiss = (e) => { if (!picker.contains(e.target)) { picker.remove(); document.removeEventListener('click', dismiss, true); } };
        setTimeout(() => document.addEventListener('click', dismiss, true), 0);
    },

    _applyColor(dsIndex, color) {
        const ds = this.instance.data.datasets[dsIndex];
        if (!ds) return;
        if (ds._baseIdx !== undefined) this._colorOverrides[ds._baseIdx] = color;
        ds.borderColor = color;
        ds.pointBackgroundColor = Array.isArray(ds.pointBackgroundColor) ? ds.pointBackgroundColor.map(() => color) : color;
        ds.pointBorderColor = Array.isArray(ds.pointBorderColor) ? ds.pointBorderColor.map(() => color) : color;
        this.instance.update();
    }
};

const Filters = {
    apply() {
        const searchTerm = Utils.getElement('searchInput').value.toLowerCase();
        const park = Utils.getElement('filterPark').value;
        const manufacturer = Utils.getElement('filterManufacturer').value;
        const category = Utils.getElement('filterCategory').value;
        const type = Utils.getElement('filterType').value;
        const status = Utils.getElement('filterStatus').value;
        const minRating = Utils.parseRating(Utils.getElement('filterRating').value);
        
        AppState.filtered = AppState.coasters.filter(coaster => {
            if (searchTerm && !`${coaster.Ride} ${coaster.Park} ${coaster.Manufacturer}`.toLowerCase().includes(searchTerm)) return false;
            if (park && coaster.Park !== park) return false;
            if (manufacturer && coaster.Manufacturer !== manufacturer) return false;
            if (category && coaster.Category !== category) return false;
            if (type && coaster.Type !== type) return false;
            if (status && coaster.Status !== status) return false;
            if (minRating > 0 && Utils.parseRating(coaster.Rating) < minRating) return false;
            return true;
        });
        this.sortCards();
        Render.coasters();
    },
    sortCards() {
        const ranked = [], unranked = [];
        AppState.filtered.forEach(c => {
            if (c.Ranking && !isNaN(parseInt(c.Ranking))) ranked.push(c);
            else unranked.push(c);
        });
        ranked.sort((a, b) => parseInt(a.Ranking) - parseInt(b.Ranking));
        unranked.sort((a, b) => {
            const ratingDiff = Utils.parseRating(b.Rating) - Utils.parseRating(a.Rating);
            return ratingDiff !== 0 ? ratingDiff : (a.Ride || '').localeCompare(b.Ride || '');
        });
        AppState.filtered = [...ranked, ...unranked];
    },
    togglePanel() { Utils.getElement('filterPanel').classList.toggle('active'); }
};

const Forms = {
    handleSubmit(e) {
        e.preventDefault();
        
        let id = "";
        if (AppState.editing) {
            id = AppState.editing.id;
        } else {
            const ride = Utils.getElement('rideName').value;
            const park = Utils.getElement('parkName').value;
            id = `${park}_${ride}`.toLowerCase().replace(/[^a-z0-9]/g, '_');
            
            let baseId = id;
            let counter = 1;
            while(masterCoasters[id] && !AppState.editing) {
                id = `${baseId}_${counter}`;
                counter++;
            }
        }
        
        // Update Static Master Dict (Memory Only)
        masterCoasters[id] = {
            name: Utils.getElement('rideName').value,
            park: Utils.getElement('parkName').value,
            manufacturer: Utils.getElement('manufacturer').value,
            category: Utils.getElement('category').value,
            type: Utils.getElement('type').value,
            openingYear: Utils.getElement('openingYear').value,
            lastRide: Utils.getElement('lastRide').value,
            status: Utils.getElement('status').value
        };
        
        // Update User Profile
        const yearKey = `logs_${currentYearStr}`;
        if(!userProfile[yearKey]) userProfile[yearKey] = {};
        
        const newRank = parseInt(Utils.getElement('ranking').value) || 0;
        
        // 1. Save the new coaster to the profile FIRST
        userProfile[yearKey][id] = {
            rating: parseFloat(Utils.getElement('rating').value) || 0,
            ranking: newRank,
            newCredit: Utils.getElement('newCredit').checked,
            comments: Utils.getElement('comments').value
        };
        
        // 2. THEN adjust the rankings to make room for it
        if (!AppState.editing && newRank > 0) {
            adjustRankings(yearKey, id, newRank);

        AppState.editing = null;
        Modals.closeAddCoaster();

const Stats = {
    updateCreditCount() {
        const count = AppState.coasters.length;
        Utils.getElement('creditCount').textContent = `${count} Credit${count !== 1 ? 's' : ''}`;
        this.autoFitStatBoxes();
    },
    updateAverageRating() {
        const ratedCoasters = AppState.coasters.filter(c => c.Rating && Utils.parseRating(c.Rating) > 0);
        if (ratedCoasters.length === 0) { Utils.getElement('averageRating').textContent = 'Avg: —'; this.autoFitStatBoxes(); return; }
        const average = ratedCoasters.reduce((acc, c) => acc + Utils.parseRating(c.Rating), 0) / ratedCoasters.length;
        Utils.getElement('averageRating').textContent = `Avg: ${average.toFixed(2)}`;
        this.autoFitStatBoxes();
    },
    autoFitStatBoxes() {
        const boxes = [Utils.getElement('creditCount'), Utils.getElement('averageRating')];
        const maxFontSize = window.innerWidth <= 768 ? 16 : 20;
        const minFontSize = 10;
        const sizes = boxes.map(box => {
            box.style.fontSize = maxFontSize + 'px';
            let fontSize = maxFontSize;
            while (fontSize > minFontSize && box.scrollWidth > box.clientWidth) {
                fontSize -= 0.5; box.style.fontSize = fontSize + 'px';
            }
            return fontSize;
        });
        const syncedSize = Math.min(...sizes);
        boxes.forEach(box => box.style.fontSize = syncedSize + 'px');
    }
};

function cleanCoasterLabel(value, field) {
    if (field !== 'Category' && field !== 'Type') return value;
    let cleaned = value;
    if (cleaned.endsWith(' Coaster')) cleaned = cleaned.slice(0, -8);
    if (cleaned === 'Hypercoaster') cleaned = 'Hyper';
    return cleaned;
}

function updateCascadingFilters(parkId, mfrId, catId, typeId, statusId) {
    const park = Utils.getElement(parkId).value; const mfr = Utils.getElement(mfrId).value; const cat = Utils.getElement(catId).value; const type = Utils.getElement(typeId).value;
    const repopulate = (selectId, field, placeholder, currentValue, filterFn) => {
        const select = Utils.getElement(selectId); if (!select) return;
        const subset = filterFn(AppState.coasters).filter(c => c.Rating && Utils.parseRating(c.Rating) > 0);
        const frequency = {}; subset.forEach(coaster => { const value = coaster[field]; if (value) frequency[value] = (frequency[value] || 0) + 1; });
        const sorted = Object.keys(frequency).sort((a, b) => frequency[b] - frequency[a]);
        select.innerHTML = `<option value="">${placeholder}</option>`;
        sorted.forEach(opt => { const option = document.createElement('option'); option.value = opt; option.textContent = `${cleanCoasterLabel(opt, field)} (${frequency[opt]})`; select.appendChild(option); });
        if (currentValue && sorted.includes(currentValue)) select.value = currentValue;
    };
    repopulate(mfrId, 'Manufacturer', 'All Manufacturers', mfr, (coasters) => park ? coasters.filter(c => c.Park === park) : coasters);
    repopulate(catId, 'Category', 'All Categories', cat, (coasters) => { let filtered = coasters; if (park) filtered = filtered.filter(c => c.Park === park); if (mfr) filtered = filtered.filter(c => c.Manufacturer === mfr); return filtered; });
    repopulate(typeId, 'Type', 'All Types', type, (coasters) => { let filtered = coasters; if (park) filtered = filtered.filter(c => c.Park === park); if (mfr) filtered = filtered.filter(c => c.Manufacturer === mfr); if (cat) filtered = filtered.filter(c => c.Category === cat); return filtered; });
    const statusSelect = Utils.getElement(statusId);
    if (statusSelect) {
        let filtered = AppState.coasters.filter(c => c.Rating && Utils.parseRating(c.Rating) > 0);
        if (park) filtered = filtered.filter(c => c.Park === park); if (mfr) filtered = filtered.filter(c => c.Manufacturer === mfr); if (cat) filtered = filtered.filter(c => c.Category === cat); if (type) filtered = filtered.filter(c => c.Type === type);
        const statusValues = [...new Set(filtered.map(c => c.Status).filter(Boolean))]; const currentStatus = statusSelect.value; statusSelect.innerHTML = '<option value="">All Statuses</option>';
        ['Operating', 'SBNO', 'Defunct'].forEach(status => { if (statusValues.includes(status)) { const count = filtered.filter(c => c.Status === status).length; const option = document.createElement('option'); option.value = status; option.textContent = `${status} (${count})`; statusSelect.appendChild(option); } });
        if (currentStatus && statusValues.includes(currentStatus)) statusSelect.value = currentStatus;
    }
}

    Utils.getElement('statsWeightedCheck').addEventListener('change', function() { Chart.useWeightedRanking = this.checked; Chart.update(); });
    Utils.getElements('[data-ot-source]').forEach(btn => { btn.addEventListener('click', () => { Utils.getElements('[data-ot-source]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); OverTimeChart.setSource(btn.dataset.otSource); }); });

    (function initRideSearch() {
        const input    = Utils.getElement('otRideSearch'); const dropdown = Utils.getElement('otRideDropdown'); const clearBtn = Utils.getElement('otRideClear');
        function showMatches(query) {
            const q = query.trim().toLowerCase();
            if (!q) { dropdown.style.display = 'none'; return; }
            const hits = [];
            Object.keys(masterCoasters).forEach(id => {
                const ride = masterCoasters[id];
                if (ride.name.toLowerCase().includes(q) || ride.park.toLowerCase().includes(q)) {
                    hits.push({ ride, id });
                    if (hits.length >= 14) return;
                }
            });
            if (hits.length === 0) dropdown.innerHTML = '<div class="ot-dropdown-none">No rides found</div>';
            else {
                dropdown.innerHTML = hits.map(({ ride, id }) => `<div class="ot-dropdown-item" data-idx="${id}">${ride.name}<span class="ride-park">${ride.park}</span></div>`).join('');
                dropdown.querySelectorAll('.ot-dropdown-item').forEach(item => { item.addEventListener('click', () => OverTimeChart.selectRide(item.dataset.idx)); });
            }
            dropdown.style.display = 'block';
        }
        input.addEventListener('input', () => { if (OverTimeChart.selectedRideId !== null) { OverTimeChart.selectedRideId = null; clearBtn.style.display = 'none'; OverTimeChart.update(); } showMatches(input.value); });
        input.addEventListener('focus', () => { if (OverTimeChart.selectedRideId === null && input.value.trim()) showMatches(input.value); });
        clearBtn.addEventListener('click', () => OverTimeChart.clearRide());
        document.addEventListener('click', (e) => { if (!e.target.closest('.ot-ride-search')) dropdown.style.display = 'none'; });
        input.addEventListener('keydown', (e) => { if (e.key === 'Escape') dropdown.style.display = 'none'; });
    })();

    ['otPark', 'otManufacturer', 'otCategory', 'otType', 'otStatus'].forEach(id => { Utils.getElement(id)?.addEventListener('change', () => { updateCascadingFilters('otPark', 'otManufacturer', 'otCategory', 'otType', 'otStatus'); if (OverTimeChart.sourceMode === 'filters') OverTimeChart.update(); }); });
    Utils.getElements('.ot-chart-limit-btn').forEach(btn => { btn.addEventListener('click', () => { OverTimeChart.otLimit = parseInt(btn.dataset.limit); Utils.getElements('.ot-chart-limit-btn').forEach(b => { b.classList.remove('btn-primary', 'active'); b.classList.add('btn-secondary'); }); btn.classList.remove('btn-secondary'); btn.classList.add('btn-primary', 'active'); if (OverTimeChart.sourceMode === 'filters') OverTimeChart.update(); }); });
    ['statsPark', 'statsManufacturer', 'statsCategory', 'statsType', 'statsStatus'].forEach(id => { Utils.getElement(id)?.addEventListener('change', () => { updateCascadingFilters('statsPark', 'statsManufacturer', 'statsCategory', 'statsType', 'statsStatus'); Chart.update(); }); });
    Utils.getElement('downloadComparisonChart')?.addEventListener('click', () => { downloadChart(Chart.instance, false); });
    Utils.getElement('downloadOverTimeChart')?.addEventListener('click', () => { downloadChart(OverTimeChart.instance, true); });
    Utils.getElement('editCoasterBtn').addEventListener('click', () => Modals.editCoasterDetails());
    
    // Updated Delete Handler
    Utils.getElement('deleteCoasterBtn').addEventListener('click', () => {
        const coaster = AppState.editing;
        if (!coaster) return;
        if (!confirm(`Are you sure you want to delete "${coaster.Ride}"?`)) return;
        
        const yearKey = `logs_${currentYearStr}`;
        if(userProfile[yearKey]) {
            delete userProfile[yearKey][coaster.id];
            normalizeRankings(yearKey);
            saveProfileToLocal(); // Save deletion to browser storage
        }
        Modals.closeDetail();
        refreshDataForYear(currentYearStr);
    });
    
    Utils.getElement('searchInput').addEventListener('input', () => Filters.apply());
    Utils.getElement('filterToggle').addEventListener('click', () => Filters.togglePanel());
    ['filterPark', 'filterManufacturer', 'filterCategory', 'filterType', 'filterStatus', 'filterRating'].forEach(id => { Utils.getElement(id)?.addEventListener('change', () => Filters.apply()); });
    Utils.getElement('addCoasterBtn').addEventListener('click', () => Modals.showAddCoaster());
    Utils.getElement('closeDetailModal').addEventListener('click', () => Modals.closeDetail());
    Utils.getElement('closeAddModal').addEventListener('click', () => Modals.closeAddCoaster());
    Utils.getElement('cancelAddBtn').addEventListener('click', () => Modals.closeAddCoaster());
    Utils.getElement('coasterForm').addEventListener('submit', (e) => Forms.handleSubmit(e));
    Utils.getElement('tableRefreshBtn').addEventListener('click', () => {
        AppState.sort = []; const defaults = { 'Ride': true, 'Park': true, 'Manufacturer': true, 'Category': true, 'Type': true, 'Opening Year': true, 'Last Ride': true, 'Status': true, 'New Credit': true, 'Rating': true, 'Ranking': true, 'Weighted Ranking': false, 'Comments': false };
        Object.keys(defaults).forEach(col => { AppState.columns[col] = defaults[col]; }); document.querySelectorAll('#columnToggles .column-toggle').forEach(btn => { const col = btn.dataset.column; if (col) btn.classList.toggle('inactive', !AppState.columns[col]); }); Render.spreadsheet();
    });
    Utils.getElement('comments').addEventListener('input', () => Forms.updateCharCount());

    (() => {
        const input = Utils.getElement('type'); const dropdown = Utils.getElement('typeDropdown'); let activeIdx = -1;
        function showMatches() {
            const val = input.value.trim().toLowerCase(); dropdown.innerHTML = ''; activeIdx = -1;
            if (!val) { dropdown.classList.remove('visible'); return; }
            const allTypes = [...new Set([...Object.values(masterCoasters).map(c => c.type).filter(Boolean)])];
            const matches = allTypes.filter(t => t.toLowerCase().includes(val));
            if (!matches.length) { dropdown.classList.remove('visible'); return; }
            matches.forEach(t => { const div = document.createElement('div'); div.className = 'type-autocomplete-item'; div.textContent = t; div.addEventListener('mousedown', (e) => { e.preventDefault(); input.value = t; dropdown.classList.remove('visible'); }); dropdown.appendChild(div); });
            dropdown.classList.add('visible');
        }
        input.addEventListener('input', showMatches); input.addEventListener('focus', showMatches); input.addEventListener('blur', () => dropdown.classList.remove('visible'));
        input.addEventListener('keydown', (e) => {
            const items = dropdown.querySelectorAll('.type-autocomplete-item'); if (!items.length) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); items.forEach((it, i) => it.classList.toggle('active', i === activeIdx)); items[activeIdx].scrollIntoView({ block: 'nearest' }); } else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); items.forEach((it, i) => it.classList.toggle('active', i === activeIdx)); items[activeIdx].scrollIntoView({ block: 'nearest' }); } else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); input.value = items[activeIdx].textContent; dropdown.classList.remove('visible'); }
        });
    })();

    (() => {
        const input = Utils.getElement('parkName'); const dropdown = Utils.getElement('parkDropdown'); let activeIdx = -1;
        function showMatches() {
            const val = input.value.trim().toLowerCase(); dropdown.innerHTML = ''; activeIdx = -1;
            if (!val) { dropdown.classList.remove('visible'); return; }
            const allParks = [...new Set([...Object.values(masterCoasters).map(c => c.park).filter(Boolean)])];
            const matches = allParks.filter(p => p.toLowerCase().includes(val));
            if (!matches.length) { dropdown.classList.remove('visible'); return; }
            matches.forEach(p => { const div = document.createElement('div'); div.className = 'type-autocomplete-item'; div.textContent = p; div.addEventListener('mousedown', (e) => { e.preventDefault(); input.value = p; dropdown.classList.remove('visible'); }); dropdown.appendChild(div); });
            dropdown.classList.add('visible');
        }
        input.addEventListener('input', showMatches); input.addEventListener('focus', showMatches); input.addEventListener('blur', () => dropdown.classList.remove('visible'));
        input.addEventListener('keydown', (e) => {
            const items = dropdown.querySelectorAll('.type-autocomplete-item'); if (!items.length) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); items.forEach((it, i) => it.classList.toggle('active', i === activeIdx)); items[activeIdx].scrollIntoView({ block: 'nearest' }); } else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); items.forEach((it, i) => it.classList.toggle('active', i === activeIdx)); items[activeIdx].scrollIntoView({ block: 'nearest' }); } else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); input.value = items[activeIdx].textContent; dropdown.classList.remove('visible'); }
        });
    })();
    
    Utils.getElement('detailModal').addEventListener('click', (e) => { if (e.target.id === 'detailModal') Modals.closeDetail(); });
    Utils.getElement('addCoasterModal').addEventListener('click', (e) => { if (e.target.id === 'addCoasterModal') Modals.closeAddCoaster(); });
    Utils.getElement('closeCommentsModal').addEventListener('click', () => { Utils.getElement('commentsModal').classList.remove('active'); Modals._unlockScroll(); });
    Utils.getElement('commentsModal').addEventListener('click', (e) => { if (e.target.id === 'commentsModal') { Utils.getElement('commentsModal').classList.remove('active'); Modals._unlockScroll(); } });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { Modals.closeDetail(); Modals.closeAddCoaster(); Utils.getElement('commentsModal').classList.remove('active'); Modals._unlockScroll(); } });
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { Chart.update(); OverTimeChart.update(); });
}

(function setupChartResize() {
    const BP = 768; function ratio() { return window.innerWidth <= BP ? 3 / 4 : 16 / 9; }
    function apply() { const r = ratio(); if (Chart.instance) { Chart.instance.options.aspectRatio = r; Chart.instance.resize(); } if (OverTimeChart.instance) { OverTimeChart.instance.options.aspectRatio = r; OverTimeChart.instance.resize(); } }
    let prev = window.innerWidth <= BP; window.addEventListener('resize', () => { const cur = window.innerWidth <= BP; if (cur !== prev) { prev = cur; apply(); } Stats.autoFitStatBoxes(); });
    window._syncChartAspect = apply;
})();

async function init() {
    document.getElementById('importDataBtn').disabled = true;
    
    // 1. Fetch the master coaster list
    try {
        const res = await fetch('./master_coasters.json?v=' + Date.now());
        masterCoasters = await res.json();
        document.getElementById('importDataBtn').disabled = false;
    } catch(e) {
        console.error("Failed to load master_coasters.json", e);
    }

    // 2. Load personal profile data (localStorage first, then fetch fallback)
    const localProfile = localStorage.getItem('thomasTrackerProfile');
    if (localProfile) {
        try {
            userProfile = JSON.parse(localProfile);
            console.log("Profile loaded from localStorage!");
        } catch(e) {
            console.error("Failed to parse localStorage profile, starting fresh.");
            userProfile = {};
        }
    } else {
        try {
            const profileRes = await fetch('./thomas_tracker_profile.json?v=' + Date.now());
            if (profileRes.ok) {
                userProfile = await profileRes.json();
                console.log("Profile automatically loaded from GitHub!");
                saveProfileToLocal(); // Seed local storage with fetched data
            }
        } catch(e) {
            console.log("No profile found locally or on GitHub, starting fresh.");
        }
    }

    // 3. Setup Dropdowns
    const currentYear = new Date().getFullYear();
    DOM.populateYearSelect('openingYear', 1900, currentYear, true);
    
    const lastRideSelect = Utils.getElement('lastRide');
    lastRideSelect.innerHTML = '<option value="">Select Year</option>';
    for (let year = currentYear; year >= 2010; year--) {
        const option = document.createElement('option'); option.value = year.toString(); option.textContent = year.toString(); lastRideSelect.appendChild(option);
    }
    const beforeOption = document.createElement('option'); beforeOption.value = 'Pre 2010'; beforeOption.textContent = 'Before 2010'; lastRideSelect.appendChild(beforeOption);
    
    DOM.populateRatingSelect('rating');
    DOM.populateRankingSelect('ranking');
    
    Utils.getElement('yearSelect').addEventListener('change', (e) => {
        refreshDataForYear(e.target.value);
    });

    // 4. Initialize everything else
    setupEventListeners();
    Chart.initialize();
    window._syncChartAspect();
    Spreadsheet.initialize();

    // 5. Force the UI to render the data we just loaded
    refreshDataForYear(currentYearStr);
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}
    </script>
